<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/logo2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fixitnow-plus</title>
    <style>
      /* Initial Preloader Styles - Shows immediately before React loads */
      #initial-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #FFFFFF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      
      #initial-preloader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      #initial-preloader .logo-container {
        width: 160px;
        height: auto;
        margin-bottom: 20px;
      }
      
      #initial-preloader .loading-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #FF5A00;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }
      
      #initial-preloader .brand-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 48px;
        font-weight: 700;
        color: #0072D1;
        letter-spacing: 4px;
      }
      
      @media (min-width: 768px) {
        #initial-preloader .logo-container {
          width: 256px;
        }
        
        #initial-preloader .loading-text {
          font-size: 32px;
        }
        
        #initial-preloader .brand-text {
          font-size: 64px;
          letter-spacing: 8px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Initial Preloader - Shows before React loads -->
    <div id="initial-preloader">
      <div class="logo-container">
        <img src="./src/assets/logo.png" alt="FixItNow Plus" style="width: 100%; height: auto; object-fit: contain;" />
      </div>
      <div class="loading-text">LOADING...</div>
      <div class="brand-text">FIXITNOW</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
